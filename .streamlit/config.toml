# Streamlit theme — PNM brand: white bg, black text, blue primary.

[theme]
base = "light"
primaryColor = "#0C5BA8"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F8F9FA"
textColor = "#000000"
font = "sans serif"

[server]
headless = false
runOnSave = true
fileWatcherType = "auto"
maxUploadSize = 200
port = 80
address = "127.0.0.1"
# Serve files from the project's static/ directory at /app/static/...
# Used to host Plus Jakarta Sans woff2 fonts locally so the app
# works fully offline (no Google Fonts CDN dependency).
enableStaticServing = true

[browser]
gatherUsageStats = false
